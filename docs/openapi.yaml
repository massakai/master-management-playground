openapi: 3.0.3
info:
  title: Product Category Master Management API
  version: 1.0.0
  description: |
    商品カテゴリマスター管理システム MVP の API 定義。
    対象機能は商品カテゴリ一覧取得、CSV ダウンロード、CSV アップロードによる全件入れ替え更新とする。
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Categories
    description: 商品カテゴリマスター操作
paths:
  /api/categories:
    get:
      tags:
        - Categories
      summary: 商品カテゴリ一覧取得
      operationId: listCategories
      description: display_order 昇順、同順位は category_code 昇順で商品カテゴリ一覧を返す。
      responses:
        '200':
          description: 正常
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponse'
              examples:
                default:
                  value:
                    categories:
                      - categoryCode: FOOD
                        categoryName: 食品
                        displayOrder: 10
                        isActive: true
                        description: 食品カテゴリ
                      - categoryCode: BOOK
                        categoryName: 書籍
                        displayOrder: 20
                        isActive: true
                        description: 書籍カテゴリ
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/categories/csv:
    get:
      tags:
        - Categories
      summary: 商品カテゴリ CSV ダウンロード
      operationId: downloadCategoriesCsv
      description: 現在のマスター内容を UTF-8 の CSV として返す。
      responses:
        '200':
          description: 正常
          headers:
            Content-Disposition:
              description: 添付ファイル名
              schema:
                type: string
                example: attachment; filename="product-categories.csv"
          content:
            text/csv:
              schema:
                type: string
              examples:
                default:
                  value: |-
                    category_code,category_name,display_order,is_active,description
                    FOOD,食品,10,true,食品カテゴリ
                    BOOK,書籍,20,true,書籍カテゴリ
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - Categories
      summary: 商品カテゴリ CSV アップロード
      operationId: uploadCategoriesCsv
      description: CSV を検証し、正常時は商品カテゴリマスターを全件入れ替え更新する。
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: UTF-8 の CSV ファイル
            encoding:
              file:
                contentType: text/csv
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryCsvUploadSuccessResponse'
              examples:
                default:
                  value:
                    success: true
                    message: 商品カテゴリを更新しました。
                    updatedCount: 2
        '400':
          description: 入力エラーまたは CSV バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryCsvUploadErrorResponse'
              examples:
                fileRequired:
                  summary: ファイル未選択
                  value:
                    success: false
                    message: CSV ファイルを選択してください。
                    errorCount: 1
                    errors:
                      - rowNumber: null
                        field: file
                        code: FILE_REQUIRED
                        message: CSV ファイルを選択してください。
                validationError:
                  summary: 行単位バリデーションエラー
                  value:
                    success: false
                    message: CSV にエラーがあります。
                    errorCount: 2
                    errors:
                      - rowNumber: 3
                        field: display_order
                        code: INVALID_INTEGER
                        message: 整数で入力してください。
                      - rowNumber: 4
                        field: is_active
                        code: INVALID_BOOLEAN
                        message: true または false を入力してください。
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  responses:
    InternalServerError:
      description: 想定外エラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            default:
              value:
                code: INTERNAL_SERVER_ERROR
                message: システムエラーが発生しました。
  schemas:
    Category:
      type: object
      required:
        - categoryCode
        - categoryName
        - displayOrder
        - isActive
      properties:
        categoryCode:
          type: string
          maxLength: 50
          pattern: '^[A-Za-z0-9_-]+$'
          description: カテゴリコード
          example: FOOD
        categoryName:
          type: string
          minLength: 1
          maxLength: 100
          description: カテゴリ名
          example: 食品
        displayOrder:
          type: integer
          format: int32
          description: 表示順
          example: 10
        isActive:
          type: boolean
          description: 有効フラグ
          example: true
        description:
          type: string
          nullable: true
          maxLength: 255
          description: 説明
          example: 食品カテゴリ
    CategoryListResponse:
      type: object
      required:
        - categories
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    CategoryCsvUploadSuccessResponse:
      type: object
      required:
        - success
        - message
        - updatedCount
      properties:
        success:
          type: boolean
          enum:
            - true
        message:
          type: string
          example: 商品カテゴリを更新しました。
        updatedCount:
          type: integer
          format: int32
          minimum: 0
          example: 2
    CategoryCsvUploadErrorResponse:
      type: object
      required:
        - success
        - message
        - errorCount
        - errors
      properties:
        success:
          type: boolean
          enum:
            - false
        message:
          type: string
          example: CSV にエラーがあります。
        errorCount:
          type: integer
          format: int32
          minimum: 1
          example: 2
        errors:
          type: array
          items:
            $ref: '#/components/schemas/CsvValidationError'
    CsvValidationError:
      type: object
      required:
        - field
        - code
        - message
      properties:
        rowNumber:
          type: integer
          format: int32
          nullable: true
          minimum: 1
          description: CSV 上の行番号。ファイル全体エラー時は null を許容する。
          example: 3
        field:
          type: string
          description: エラー対象の項目名
          example: display_order
        code:
          type: string
          enum:
            - FILE_REQUIRED
            - INVALID_ENCODING
            - INVALID_HEADER
            - EMPTY_DATA
            - REQUIRED
            - DUPLICATE_CATEGORY_CODE
            - INVALID_FORMAT
            - INVALID_INTEGER
            - INVALID_BOOLEAN
          example: INVALID_INTEGER
        message:
          type: string
          description: エラー内容
          example: 整数で入力してください。
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: INTERNAL_SERVER_ERROR
        message:
          type: string
          example: システムエラーが発生しました。
